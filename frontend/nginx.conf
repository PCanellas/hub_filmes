server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota desconhecida cai no index.html (React Router resolve)
    location / {
        try_files $uri /index.html;
    }

    # Proxy da API: /api/movies/search -> http://backend:8000/movies/search
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
